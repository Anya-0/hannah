  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Hannah Varland · OHOME<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n<meta name=\"theme-color\" content=\"#0A1F16\">\n<meta property=\"og:title\" content=\"Hannah Varland · Assistant Development Manager, OHOME\">\n<meta property=\"og:description\" content=\"Factory-built modular homes. Order to keys in 100 days.\">\n\n<style>\n  :root{\n    --forest:#0A1F16; --forest-80:#1B3328; --forest-60:#3D554A;\n    --mint:#D5EFC0; --mint-deep:#B9DFA0;\n    --bone:#F7F5F1; --n-200:#DCE0D6;\n    --font-sans:\"Geist\",\"DM Sans\",ui-sans-serif,system-ui,-apple-system,sans-serif;\n    --font-display:\"Geist\",\"DM Sans\",ui-sans-serif,system-ui,sans-serif;\n    --font-mono:\"Geist Mono\",ui-monospace,\"SF Mono\",Menlo,monospace;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--forest);color:var(--forest);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}\n  body{min-height:100dvh;min-height:100vh}\n\n  .shell{max-width:460px;margin:0 auto;background:var(--bone);min-height:100dvh;min-height:100vh;display:flex;flex-direction:column}\n\n  /* Forest top card */\n  .top{background:var(--forest);color:#fff;padding:calc(env(safe-area-inset-top) + 28px) 28px 36px}\n  .top .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;display:flex;justify-content:space-between;align-items:center}\n  .top .eyebrow .dot{width:7px;height:7px;border-radius:999px;background:var(--mint-deep);display:inline-block;margin-right:6px;vertical-align:middle}\n  .top h1{font-family:var(--font-display);font-weight:500;font-size:54px;line-height:0.95;letter-spacing:-0.045em;margin:32px 0 10px}\n  .top h1 .pt{color:var(--mint-deep)}\n  .top .role{font-size:16px;line-height:1.4;opacity:0.85;margin:0;max-width:26ch}\n\n  /* Primary CTA: save contact */\n  .save-cta{\n    margin:24px 0 0;\n    display:flex;align-items:center;justify-content:center;gap:10px;\n    background:var(--mint);color:var(--forest);\n    padding:18px 22px;\n    font-family:var(--font-mono);font-size:13px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500;\n    border:0;border-radius:999px;cursor:pointer;\n    width:100%;text-decoration:none;\n  }\n  .save-cta:active{background:var(--mint-deep)}\n  .save-cta svg{flex-shrink:0}\n\n  /* Body sections */\n  .sect{padding:28px 28px 0}\n  .sect + .sect{padding-top:32px}\n  .sect-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.5;margin-bottom:14px}\n\n  .link-row{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-top:1px solid var(--n-200);font-size:16px;text-decoration:none;color:var(--forest)}\n  .link-row:last-child{border-bottom:1px solid var(--n-200)}\n  .link-row .k{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.55;display:block;margin-bottom:4px}\n  .link-row .v{font-size:17px;letter-spacing:-0.01em;word-break:break-all}\n  .link-row .arrow{flex-shrink:0;margin-left:16px;opacity:0.4}\n  .link-row:active{background:rgba(10,31,22,0.03)}\n\n  /* Brief */\n  .brief{background:var(--mint);color:var(--forest);padding:32px 28px;margin-top:36px}\n  .brief .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.55;margin-bottom:14px}\n  .brief h2{font-family:var(--font-display);font-weight:400;font-size:28px;line-height:1.15;letter-spacing:-0.03em;margin:0;max-width:22ch}\n  .brief h2 .pt{color:var(--forest);font-weight:500}\n\n  /* Specs */\n  .specs{display:grid;grid-template-columns:repeat(3,1fr);background:var(--forest);color:#fff;padding:28px;gap:4px}\n  .spec{padding:4px 8px 4px 0}\n  .spec + .spec{border-left:1px solid rgba(255,255,255,0.18);padding-left:16px}\n  .spec .k{font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.6;display:block;margin-bottom:8px}\n  .spec .v{font-family:var(--font-display);font-weight:500;font-size:28px;line-height:1;letter-spacing:-0.04em}\n  .spec .unit{font-family:var(--font-sans);font-size:12px;opacity:0.6;letter-spacing:0;margin-left:2px;font-weight:400}\n\n  /* Foot */\n  .foot{padding:28px 28px calc(env(safe-area-inset-bottom) + 40px);background:var(--forest);color:#fff}\n  .foot .partners{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.55;line-height:1.8}\n  .foot .cta-web{display:block;margin-top:18px;padding:16px 20px;border:1px solid rgba(255,255,255,0.25);color:#fff;text-decoration:none;text-align:center;font-family:var(--font-mono);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;border-radius:999px}\n  .foot .cta-web:active{background:rgba(255,255,255,0.08)}\n  .foot .meta{margin-top:24px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.5}\n\n  /* Toast */\n  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(140%);background:var(--forest);color:var(--mint);padding:14px 20px;border-radius:999px;font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;transition:transform .35s cubic-bezier(.2,.8,.2,1);z-index:100}\n  .toast.show{transform:translateX(-50%) translateY(0)}\n\n  .top .eyebrow .brand{display:inline-flex;align-items:center}\n  .top .eyebrow .brand .ohome-logo{height:40px;width:auto;display:block}\n  /* Two-col header: name left, portrait right */\n  .hero-row{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;margin-top:32px}\n  .hero-row .name-col h1{margin:0 0 10px}\n  .hero-row .name-col .role{font-size:15px;line-height:1.4;opacity:0.85;margin:0;max-width:22ch}\n  .portrait{width:112px;height:112px;border-radi
